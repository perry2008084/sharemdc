    document.getElementById('testExport').addEventListener('click', function() {

      const content = document.getElementById('content').textContent;
      const previewEl = document.getElementById('content');

      if (window.ExportModule) {
        window.ExportModule.showExportMenu(
          this,
          content,
          previewEl,
          'test',

        );
      } else {
        console.error('ExportModule not loaded');
      }
    });
